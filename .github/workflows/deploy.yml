# ──────────────────────────────────────────────────────────────
# Korenty — Deploy to GitHub Pages
# Runs automatically on every push to `main`.
# ──────────────────────────────────────────────────────────────
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow a manual trigger from the Actions tab
  workflow_dispatch:

# Required permissions for the GITHUB_TOKEN to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; queued runs wait, not cancel
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repository root (all HTML, CSS, JS files)
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
